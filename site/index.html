<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Apostolos Lagonikas — Software Engineer portfolio" />
  <title>Apostolos Lagonikas — Software Engineer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <div class="meshGradient" aria-hidden="true"></div>

  <header class="nav" id="nav">
    <div class="navInner">
      <a class="navBrand" href="#top" data-brand></a>
      <nav class="navLinks" id="navLinks" aria-label="Primary"></nav>
    </div>
  </header>

  <main id="top">
    <section class="hero" id="about">
      <div class="heroInner">
        <p class="heroEyebrow" data-eyebrow></p>
        <h1 class="heroName" data-name></h1>
        <h2 class="heroTitle" data-title></h2>
        <p class="heroSummary" data-summary></p>
        <div class="heroCta">
          <a class="btn btnPrimary" data-cv target="_blank" rel="noreferrer">Download CV</a>
          <a class="btn btnGhost" href="#projects">View Projects</a>
        </div>
      </div>
    </section>

    <section class="section" id="experience">
      <div class="sectionHead">
        <span class="sectionTag">01 / Career</span>
        <h3 class="sectionTitle">Experience</h3>
      </div>
      <div class="timeline" id="experienceList"></div>
    </section>

    <section class="section" id="projects">
      <div class="sectionHead">
        <span class="sectionTag">02 / Work</span>
        <h3 class="sectionTitle">Selected Projects</h3>
      </div>
      <div class="projectsGrid" id="projectsList"></div>
    </section>

    <section class="section" id="skills">
      <div class="sectionHead">
        <span class="sectionTag">03 / Toolkit</span>
        <h3 class="sectionTitle">Skills</h3>
      </div>
      <div class="skillsGrid" id="skillsList"></div>
    </section>

    <section class="section" id="education">
      <div class="sectionHead">
        <span class="sectionTag">04 / Learning</span>
        <h3 class="sectionTitle">Education</h3>
      </div>
      <div class="eduGrid" id="educationList"></div>
    </section>

    <section class="section" id="contact">
      <div class="sectionHead">
        <span class="sectionTag">05 / Connect</span>
        <h3 class="sectionTitle">Get in touch</h3>
      </div>
      <div class="contactCard" id="contactCard"></div>
    </section>
  </main>

  <footer class="footer">
    <p data-footer></p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
